<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7df1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f4d03f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="10" y="10" width="100" height="100" rx="15" fill="url(#jsGrad)" filter="url(#glow)"/>
  <text x="60" y="45" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="14" font-weight="bold">JS</text>
  <text x="60" y="65" text-anchor="middle" fill="#333" font-family="Arial, sans-serif" font-size="10">JavaScript</text>
  <circle cx="30" cy="30" r="3" fill="#38b6ff" opacity="0.8"/>
  <circle cx="90" cy="30" r="2" fill="#49e8ff" opacity="0.6"/>
  <circle cx="30" cy="90" r="2" fill="#4be7ff" opacity="0.7"/>
  <circle cx="90" cy="90" r="3" fill="#38b6ff" opacity="0.9"/>
</svg>